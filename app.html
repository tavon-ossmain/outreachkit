<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutreachKit — Cold Outreach System for AI Agency Founders</title>
  <meta name="description" content="Get a complete cold outreach system tailored to your AI agency. Cold emails, LinkedIn DMs, proposals, pricing, and objection handlers — ready in 60 seconds." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1c1c20;
      --border: #2a2a2f;
      --text: #e8e8ec;
      --text-dim: #8b8b96;
      --accent: #6c5ce7;
      --accent-hover: #7c6ef7;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --green: #2ecc71;
      --orange: #f39c12;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 20px; }

    /* Header */
    .header {
      text-align: center;
      padding: 60px 20px 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .header .badge {
      display: inline-block;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(108, 92, 231, 0.3);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #a8a8b3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-dim);
      font-size: 18px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }
    .form-card h2 {
      font-size: 20px;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select { cursor: pointer; }
    .form-group select option { background: var(--surface-2); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .header h1 { font-size: 28px; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    /* Output sections */
    .output-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .output-header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .output-header:hover { background: var(--surface-2); }
    .output-header h3 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .output-header .count {
      background: var(--accent-glow);
      color: var(--accent);
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
      font-weight: 500;
    }
    .output-header .chevron {
      color: var(--text-dim);
      transition: transform 0.2s;
      font-size: 18px;
    }
    .output-header .chevron.open { transform: rotate(180deg); }
    .output-body { padding: 0 24px 24px; }
    .output-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
    }
    .output-item:last-child { margin-bottom: 0; }
    .output-item h4 {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .output-item p, .output-item li {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }
    .output-item ul { padding-left: 20px; }
    .output-item li { margin-bottom: 4px; }
    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }

    .subject-line {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 8px;
      font-style: italic;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pricing banner */
    .pricing-bar {
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 32px;
      font-weight: 600;
      font-size: 15px;
    }
    .pricing-bar span {
      text-decoration: line-through;
      opacity: 0.7;
      margin-right: 8px;
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>

          {
            subject: "{{company}} — are you using your data?",
            body: `Hi {{firstName}},\n\nQuick question: does {{company}} have data sitting in spreadsheets, dashboards, or databases that nobody has time to analyze properly?\n\nWe build AI analytics systems that turn raw business data into actionable insights — automatically. No more waiting for quarterly reports or hiring data analysts.\n\nWorth a quick chat to see if there's an opportunity?\n\n{{yourName}}`
          },
          {
            subject: "Re: data insights for {{company}}",
            body: `Hi {{firstName}},\n\nFollowing up — here's a concrete example. We recently helped a {{industry}} company connect their sales, marketing, and operations data into a single AI-powered dashboard. Within a week, it surfaced $200K in revenue opportunities they didn't know existed.\n\nThe data was always there. They just needed AI to connect the dots.\n\nHappy to show you how it works for {{industry}}.\n\n{{yourName}}`
          },
          {
            subject: "What decisions is {{company}} making blind?",
            body: `Hi {{firstName}},\n\nEvery business has blind spots — decisions being made on gut feel when the data exists to make them with confidence.\n\nFor {{industry}} companies, the biggest ones are usually: customer churn prediction, pricing optimization, and operational efficiency.\n\nIf any of those resonate, I'd love to show you how AI analytics solves them.\n\n{{yourName}}`
          },
          {
            subject: "Free data audit for {{company}}",
            body: `Hi {{firstName}},\n\nI'll make this easy — we offer a free 30-minute data audit where we look at what data {{company}} has, identify the top 3 insights hiding in it, and show you what an AI analytics system would deliver.\n\nYou walk away with actionable insights whether you work with us or not.\n\nWorth it?\n\n{{yourName}}`
          },
          {
            subject: "{{firstName}}, final thought",
            body: `Hi {{firstName}},\n\nLast note from me. If {{company}} is making any decisions based on manual reports, spreadsheets, or gut instinct — there's a better way.\n\nOur AI analytics systems deliver real-time insights, predictions, and recommendations. For {{industry}} companies, this typically means:\n\n• 15-25% improvement in operational efficiency\n• Early warning on churn and revenue risks\n• Data-driven pricing and resource allocation\n\nHappy to chat whenever the timing is right.\n\n{{yourName}}`
          }
        ],
        dms: [
          `Hey {{firstName}} — does {{company}} have data that's not being used to its full potential? We build AI analytics systems for {{industry}} companies that turn raw data into real-time insights and predictions. If data-driven decision making is on your radar, happy to chat.`,
          `Hi {{firstName}}, curious — how is {{company}} handling data analytics right now? Manual reports? Dashboards nobody checks? We've been helping {{industry}} companies build AI-powered analytics that actually drive decisions. Would love to hear how you're approaching it.`,
          `{{firstName}} — we help {{industry}} businesses turn their existing data into actionable insights using AI. No expensive BI tools or data science hires needed. If {{company}} is sitting on data that could be working harder for you, let's chat.`
        ],
        proposal: `# AI Analytics Proposal for {{company}}\n\n## The Problem\n{{company}} has valuable data across multiple systems, but extracting actionable insights requires significant manual effort and specialized skills.\n\n## The Solution\nAn AI-powered analytics system that connects your data sources, identifies patterns, and delivers real-time insights and predictions.\n\n## What You Get\n- AI analytics dashboard connecting all your data sources\n- Automated insight generation and anomaly detection\n- Predictive models for key business metrics\n- Natural language query interface (ask questions in plain English)\n- Weekly automated insight reports\n\n## Timeline\n- Week 1: Data source audit & integration planning\n- Week 2-3: System build & model training\n- Week 4: Deployment & team training\n\n## Investment\n{{pricingTier}}\n\n## Guarantee\nIf the system doesn't surface at least 3 actionable insights in the first 30 days that you weren't previously aware of, we'll refund you in full.`,
        objections: [
          { objection: "We already have a BI tool", response: "BI tools show you what happened. AI analytics tells you why it happened and what's going to happen next. Think of it as an upgrade — we can even layer on top of your existing tools so nothing goes to waste." },
          { objection: "Our data is messy", response: "Every company says this, and it's almost never as bad as they think. Part of our service is data cleaning and normalization. We've worked with far messier data than you probably have, and the AI is surprisingly good at finding signal in noise." },
          { objection: "We don't have enough data", response: "You'd be surprised. If you have 6+ months of sales data, customer data, or operational data, that's usually enough to start generating meaningful insights. We can assess this in a free 30-minute audit." },
          { objection: "Our team won't use it", response: "That's why we build a natural language interface. Your team doesn't need to learn SQL or navigate complex dashboards. They just ask questions in plain English: 'Why did sales drop last week?' or 'Which customers are likely to churn?' The AI handles the rest." },
          { objection: "How do we know the insights are accurate?", response: "Every insight comes with a confidence score and the underlying data that supports it. We don't give you black-box predictions — we show you exactly why the AI reached each conclusion. Your team validates everything before acting on it." }
        ],
        pricing: {
          low: "$2,000 - $4,000/month",
          mid: "$4,000 - $8,000/month",
          high: "$8,000 - $15,000/month",
          note: "Starter covers basic dashboarding and 1-2 data sources. Growth adds predictive models and 5+ integrations. Enterprise includes custom models, unlimited sources, and dedicated support."
        }
      }
    };

    // ========== HELPER ==========
    function fillTemplate(text, vars) {
      let result = text;
      Object.entries(vars).forEach(([key, val]) => {
        result = result.replace(new RegExp(`\\{\\{${key}\\}\\}`, 'g'), val || `[${key}]`);
      });
      return result;
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {});
    }

    // ========== COMPONENTS ==========
    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      return (
        <button
          className="copy-btn"
          onClick={() => {
            copyText(text);
            setCopied(true);
            setTimeout(() => setCopied(false), 1500);
          }}
        >
          {copied ? "Copied!" : "Copy"}
        </button>
      );
    }

    function Section({ title, count, children, defaultOpen }) {
      const [open, setOpen] = useState(defaultOpen || false);
      return (
        <div className="output-section">
          <div className="output-header" onClick={() => setOpen(!open)}>
            <h3>{title} <span className="count">{count}</span></h3>
            <span className={`chevron ${open ? 'open' : ''}`}>&#9662;</span>
          </div>
          {open && <div className="output-body">{children}</div>}
        </div>
      );
    }

    // ========== MAIN APP ==========
    function App() {
      const [step, setStep] = useState('form');
      const [formData, setFormData] = useState({
        yourName: '',
        agencyName: '',
        service: 'chatbot',
        targetIndustry: '',
        idealClient: '',
        uniqueValue: ''
      });

      const update = (key, val) => setFormData(prev => ({ ...prev, [key]: val }));

      const canGenerate = formData.yourName && formData.service && formData.targetIndustry;

      const generate = () => {
        setStep('results');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const vars = {
        yourName: formData.yourName,
        firstName: '{{firstName}}',
        company: '{{company}}',
        industry: formData.targetIndustry,
        estimatedCost: '5,000',
        pricingTier: TEMPLATES[formData.service]?.pricing
          ? `Starter: ${TEMPLATES[formData.service].pricing.low}\nGrowth: ${TEMPLATES[formData.service].pricing.mid}\nEnterprise: ${TEMPLATES[formData.service].pricing.high}`
          : ''
      };

      const template = TEMPLATES[formData.service];

      if (step === 'form') {
        return (
          <div>
            <div className="header">
              <div className="badge">For AI Agency Founders</div>
              <h1>OutreachKit</h1>
              <p>Get a complete cold outreach system for your AI agency — emails, DMs, proposals, pricing, and objection handlers. Ready in 60 seconds.</p>
            </div>
            <div className="container">
              <div className="form-card">
                <h2>Tell us about your AI agency</h2>
                <div className="form-row">
                  <div className="form-group">
                    <label>Your name</label>
                    <input
                      type="text"
                      placeholder="e.g. Tavon"
                      value={formData.yourName}
                      onChange={e => update('yourName', e.target.value)}
                    />
                  </div>
                  <div className="form-group">
                    <label>Agency name (optional)</label>
                    <input
                      type="text"
                      placeholder="e.g. NexusAI"
                      value={formData.agencyName}
                      onChange={e => update('agencyName', e.target.value)}
                    />
                  </div>
                </div>
                <div className="form-group">
                  <label>What AI service do you offer?</label>
                  <select value={formData.service} onChange={e => update('service', e.target.value)}>
                    <option value="chatbot">AI Chatbot / Customer Support</option>
                    <option value="automation">AI Workflow Automation</option>
                    <option value="content">AI Content Creation</option>
                    <option value="analytics">AI Data Analytics / Insights</option>
                  </select>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label>Target industry</label>
                    <input
                      type="text"
                      placeholder="e.g. Real Estate, E-commerce, Healthcare"
                      value={formData.targetIndustry}
                      onChange={e => update('targetIndustry', e.target.value)}
                    />
                  </div>
                  <div className="form-group">
                    <label>Ideal client title (optional)</label>
                    <input
                      type="text"
                      placeholder="e.g. CEO, Head of Operations"
                      value={formData.idealClient}
                      onChange={e => update('idealClient', e.target.value)}
                    />
                  </div>
                </div>
                <div className="form-group">
                  <label>What makes your service unique? (optional)</label>
                  <textarea
                    placeholder="e.g. We guarantee 60% ticket reduction in 30 days or your money back"
                    value={formData.uniqueValue}
                    onChange={e => update('uniqueValue', e.target.value)}
                  />
                </div>
                <button className="btn btn-primary" onClick={generate} disabled={!canGenerate}>
                  Generate My Outreach System
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ========== RESULTS ==========
      return (
        <div>
          <div className="header" style={{ paddingBottom: '20px' }}>
            <h1 style={{ fontSize: '32px' }}>Your Outreach System</h1>
            <p>Customized for {formData.agencyName || 'your agency'} — {template.label} for {formData.targetIndustry}</p>
            <div style={{ marginTop: '16px' }}>
              <button className="btn btn-secondary" onClick={() => setStep('form')} style={{ width: 'auto', padding: '10px 20px' }}>
                ← Edit Inputs
              </button>
            </div>
          </div>
          <div className="container">
            <Section title="Cold Email Sequence" count={`${template.emails.length} emails`} defaultOpen={true}>
              {template.emails.map((email, i) => {
                const subject = fillTemplate(email.subject, vars);
                const body = fillTemplate(email.body, vars);
                const fullText = `Subject: ${subject}\n\n${body}`;
                return (
                  <div className="output-item" key={i}>
                    <CopyButton text={fullText} />
                    <h4>Email {i + 1}</h4>
                    <div className="subject-line">Subject: {subject}</div>
                    <p style={{ whiteSpace: 'pre-wrap' }}>{body}</p>
                  </div>
                );
              })}
            </Section>

            <Section title="LinkedIn DM Scripts" count={`${template.dms.length} scripts`}>
              {template.dms.map((dm, i) => {
                const text = fillTemplate(dm, vars);
                return (
                  <div className="output-item" key={i}>
                    <CopyButton text={text} />
                    <h4>DM Script {i + 1}</h4>
                    <p style={{ whiteSpace: 'pre-wrap' }}>{text}</p>
                  </div>
                );
              })}
            </Section>

            <Section title="Proposal Template" count="1 template">
              {(() => {
                const text = fillTemplate(template.proposal, vars);
                return (
                  <div className="output-item">
                    <CopyButton text={text} />
                    <h4>Client Proposal</h4>
                    <p style={{ whiteSpace: 'pre-wrap' }}>{text}</p>
                  </div>
                );
              })()}
            </Section>

            <Section title="Objection Handlers" count={`${template.objections.length} responses`}>
              {template.objections.map((obj, i) => (
                <div className="output-item" key={i}>
                  <CopyButton text={`Objection: "${obj.objection}"\n\nResponse: ${obj.response}`} />
                  <h4>"{obj.objection}"</h4>
                  <p>{obj.response}</p>
                </div>
              ))}
            </Section>

            <Section title="Pricing Framework" count="3 tiers">
              <div className="output-item">
                <CopyButton text={`Starter: ${template.pricing.low}\nGrowth: ${template.pricing.mid}\nEnterprise: ${template.pricing.high}\n\n${template.pricing.note}`} />
                <h4>Recommended Pricing Tiers</h4>
                <ul>
                  <li><strong>Starter:</strong> {template.pricing.low}</li>
                  <li><strong>Growth:</strong> {template.pricing.mid}</li>
                  <li><strong>Enterprise:</strong> {template.pricing.high}</li>
                </ul>
                <p style={{ marginTop: '12px', color: 'var(--text-dim)', fontSize: '13px' }}>{template.pricing.note}</p>
              </div>
            </Section>
          </div>
          <div className="footer">
            OutreachKit — Built for AI agency founders who'd rather close deals than write emails.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
